name: VitalCommandIOS
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.xmly.vitalcommandios
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BBT2D26L2V
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: HealthAI
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSHealthShareUsageDescription: HealthAI 需要读取 Apple 健康中的睡眠、运动、步数和身体组成数据，用于更新你的健康趋势与 AI 分析。
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
      - UIInterfaceOrientationPortrait
    INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
packages:
  VitalCommandMobileCore:
    path: ./VitalCommandMobileCore
targets:
  VitalCommandIOS:
    type: application
    platform: iOS
    entitlements:
      path: VitalCommandIOS/VitalCommandIOS.entitlements
    sources:
      - path: VitalCommandIOS
    dependencies:
      - package: VitalCommandMobileCore
