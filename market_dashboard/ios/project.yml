name: PortfolioWorkbenchIOS
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BBT2D26L2V
    TARGETED_DEVICE_FAMILY: 1
    PRODUCT_BUNDLE_IDENTIFIER: com.bbt2d26l2v.PortfolioWorkbenchIOS
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PORTFOLIO_WORKBENCH_DEFAULT_SERVER_URL: http://10.8.144.16:8008/
targets:
  PortfolioWorkbenchMobileCore:
    type: framework
    platform: iOS
    sources:
      - path: PortfolioWorkbenchMobileCore/Sources/PortfolioWorkbenchMobileCore
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BBT2D26L2V
        PRODUCT_BUNDLE_IDENTIFIER: com.bbt2d26l2v.PortfolioWorkbenchMobileCore
        GENERATE_INFOPLIST_FILE: YES
  PortfolioWorkbenchIOS:
    type: application
    platform: iOS
    sources:
      - path: PortfolioWorkbenchIOS
        excludes:
          - App/AppSettingsStore 2.swift
          - Features/Auth/LoginScreen 2.swift
    dependencies:
      - target: PortfolioWorkbenchMobileCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PortfolioWorkbenchIOS/Info.plist
